<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Control Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg: #0B1220;
    --card: #101C30;
    --card-2: #0D1728;
    --line: rgba(148,163,184,0.14);
    --line-strong: rgba(148,163,184,0.24);
    --text: #E7EEF6;
    --text-dim: #94A3B8;
    --text-faint: #5B6B80;
    --cyan: #22D3EE;
    --teal: #14B8A6;
    --grad: linear-gradient(90deg, var(--cyan), var(--teal));
    --red: #EF6461;
    --amber: #F2B155;
    --green: #20BF55;
    --purple: #A78BFA;
    --font-head: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  body[data-mode="light"]{
    --bg: #F4F7FA;
    --card: #FFFFFF;
    --card-2: #F8FAFC;
    --line: rgba(15,23,42,0.08);
    --line-strong: rgba(15,23,42,0.16);
    --text: #0F172A;
    --text-dim: #475569;
    --text-faint: #94A3B8;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 24px;
    min-height: 100vh;
  }
  .app{ max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  
  header{
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    background: var(--card); padding: 16px 20px; border-radius: 12px; border: 1px solid var(--line);
  }
  .brand{ display: flex; align-items: center; gap: 10px; }
  .logo{ width: 32px; height: 32px; background: var(--grad); border-radius: 8px; display: grid; place-items: center; font-weight: 700; color: #000; font-family: var(--font-head); }
  .brand h1{ font-size: 1.1rem; font-family: var(--font-head); font-weight: 700; letter-spacing: -0.02em; }
  
  .controls{ display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .btn{
    background: var(--card-2); color: var(--text); border: 1px solid var(--line);
    padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s;
  }
  .btn:hover{ border-color: var(--line-strong); background: var(--card); }
  .btn-primary{ background: var(--grad); color: #000; border: none; font-weight: 600; }
  .btn-primary:hover{ opacity: 0.9; }
  
  .month-picker{
    display: flex; align-items: center; background: var(--card-2); border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
  }
  .month-picker button{ background: transparent; border: none; color: var(--text); padding: 8px 10px; cursor: pointer; }
  .month-picker button:hover{ background: var(--line); }
  .month-picker input{ background: transparent; border: none; color: var(--text); font-family: var(--font-body); font-weight: 600; padding: 6px; cursor: pointer; text-align: center; }

  select.btn{ cursor: pointer; outline: none; }

  .grid-3{ display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
  .grid-2{ display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  @media(max-width: 900px){ .grid-2{ grid-template-columns: 1fr; } }

  .card{
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .card-title{ font-size: 0.8rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center;}

  .stat-val{ font-size: 1.8rem; font-family: var(--font-head); font-weight: 700; color: var(--text); }
  .stat-val.pos{ color: var(--cyan); }
  .stat-val.neg{ color: var(--red); }
  
  .progress-bar{ height: 6px; background: var(--card-2); border-radius: 3px; overflow: hidden; border: 1px solid var(--line); }
  .progress-fill{ height: 100%; background: var(--grad); border-radius: 3px; transition: width 0.3s; }

  table{ width: 100%; border-collapse: collapse; text-align: left; font-size: 0.88rem; }
  th{ color: var(--text-dim); font-weight: 500; padding: 10px; border-bottom: 1px solid var(--line); }
  td{ padding: 12px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tr:last-child td{ border-bottom: none; }
  .mono{ font-family: var(--font-mono); }
  
  .tag{ padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 500; background: var(--card-2); border: 1px solid var(--line); display: inline-block; }
  .tag-income{ background: rgba(32, 191, 85, 0.1); color: var(--green); border-color: rgba(32, 191, 85, 0.2); }
  .tag-expense{ background: rgba(239, 100, 97, 0.1); color: var(--red); border-color: rgba(239, 100, 97, 0.2); }

  .filtered-sum-box {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--card-2); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 12px; font-size: 0.9rem; font-weight: 500;
  }
  .filtered-sum-val { font-family: var(--font-mono); font-weight: 700; font-size: 1.1rem; }

  .actions{ display: flex; gap: 6px; }
  .icon-btn{ background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 4px; }
  .icon-btn:hover{ color: var(--text); background: var(--line); }

  .search-filter-bar{ display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .input-text{ background: var(--card-2); border: 1px solid var(--line); color: var(--text); padding: 8px 12px; border-radius: 8px; outline: none; font-size: 0.85rem; }
  .input-text:focus{ border-color: var(--cyan); }

  .modal-bg{ position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; place-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-bg.open{ opacity: 1; pointer-events: auto; }
  .modal{ background: var(--card); border: 1px solid var(--line-strong); width: 100%; max-width: 440px; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .modal-head{ display: flex; justify-content: space-between; align-items: center; }
  .modal-head h3{ font-family: var(--font-head); }
  
  .form-group{ display: flex; flex-direction: column; gap: 6px; }
  .form-group label{ font-size: 0.8rem; color: var(--text-dim); font-weight: 500; }
  
  .file-drop{ border: 2px dashed var(--line-strong); padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; color: var(--text-dim); }
  .file-drop:hover{ border-color: var(--cyan); color: var(--text); }
</style>
</head>
<body data-mode="dark">

<div class="app">
  <header>
    <div class="brand">
      <div class="logo">₱</div>
      <h1>Dashboard</h1>
    </div>
    <div class="controls">
      <div class="month-picker">
        <button id="prevMonth">‹</button>
        <input type="month" id="monthInput">
        <button id="nextMonth">›</button>
      </div>
      <select id="currencySelect" class="btn">
        <option value="PHP">PHP (₱)</option>
        <option value="USD">USD ($)</option>
        <option value="EUR">EUR (€)</option>
        <option value="GBP">GBP (£)</option>
        <option value="JPY">JPY (¥)</option>
      </select>
      <button class="btn btn-primary" onclick="openModal('transaction')">+ Add Tx</button>
      <button class="btn" onclick="openModal('import')">Import</button>
      <button class="btn" onclick="exportData()">Export</button>
      <button class="btn" id="themeBtn">☀/🌙</button>
      <button class="btn" onclick="openModal('settings')">⚙</button>
    </div>
  </header>

  <div class="grid-3">
    <div class="card">
      <div class="card-title">Net Balance</div>
      <div class="stat-val pos" id="netBalance">₱0.00</div>
      <div style="font-size: 0.8rem; color: var(--text-dim);" id="balanceSubtext">Inflow vs Outflow</div>
    </div>
    <div class="card">
      <div class="card-title">Total Income</div>
      <div class="stat-val" id="totalIncome" style="color: var(--green);">₱0.00</div>
      <div class="progress-bar"><div class="progress-fill" id="incomeBar" style="width: 0%; background: var(--green);"></div></div>
    </div>
    <div class="card">
      <div class="card-title">Total Expenses</div>
      <div class="stat-val" id="totalExpense" style="color: var(--red);">₱0.00</div>
      <div class="progress-bar"><div class="progress-fill" id="expenseBar" style="width: 0%; background: var(--red);"></div></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title">
        Recent Transactions
        <button class="btn" style="padding: 2px 8px; font-size: 0.75rem;" onclick="openModal('transaction')">+ New</button>
      </div>
      
      <div class="search-filter-bar">
        <input type="text" id="txSearch" class="input-text" placeholder="Search..." style="flex: 1;" oninput="renderTransactionsTable()">
        <select id="txCatFilter" class="input-text" onchange="renderTransactionsTable()">
          <option value="ALL">All Categories</option>
        </select>
      </div>

      <div id="filteredSumDisplay" class="filtered-sum-box">
        <span>Filtered Total:</span>
        <span id="filteredSumValue" class="filtered-sum-val">₱0.00</span>
      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Description</th>
              <th>Category</th>
              <th style="text-align: right;">Amount</th>
              <th style="text-align: center;">Action</th>
            </tr>
          </thead>
          <tbody id="txTableBody"></tbody>
        </table>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 16px;">
      <div class="card">
        <div class="card-title">Top Expense Categories</div>
        <div id="categoryBreakdown" style="display: flex; flex-direction: column; gap: 10px;"></div>
      </div>

      <div class="card">
        <div class="card-title">
          Monthly Bills
          <button class="btn" style="padding: 2px 8px; font-size: 0.75rem;" onclick="openModal('bill')">+ Add</button>
        </div>
        <div id="billsList" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>

      <div class="card">
        <div class="card-title">
          Savings Goals
          <button class="btn" style="padding: 2px 8px; font-size: 0.75rem;" onclick="openModal('goal')">+ Add</button>
        </div>
        <div id="goalsList" style="display: flex; flex-direction: column; gap: 10px;"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const CURRENCIES = { PHP: '₱', USD: '$', EUR: '€', GBP: '£', JPY: '¥' };
let state = {
  currency: 'PHP',
  currentMonth: new Date().toISOString().slice(0, 7),
  transactions: [],
  bills: [],
  goals: [],
  budgets: {}
};

function init() {
  const saved = localStorage.getItem('budget_app_data');
  if(saved) {
    try { state = Object.assign(state, JSON.parse(saved)); } catch(e){}
  }
  
  document.getElementById('monthInput').value = state.currentMonth;
  document.getElementById('currencySelect').value = state.currency;
  
  document.getElementById('prevMonth').addEventListener('click', ()=> changeMonth(-1));
  document.getElementById('nextMonth').addEventListener('click', ()=> changeMonth(1));
  document.getElementById('monthInput').addEventListener('change', (e)=>{
    if(e.target.value) { state.currentMonth = e.target.value; save(); render(); }
  });
  document.getElementById('currencySelect').addEventListener('change', (e)=>{
    state.currency = e.target.value; save(); render();
  });

  render();
}

function save() {
  localStorage.setItem('budget_app_data', JSON.stringify(state));
}

function changeMonth(delta) {
  let [y, m] = state.currentMonth.split('-').map(Number);
  m += delta;
  if(m > 12){ m = 1; y++; }
  if(m < 1){ m = 12; y--; }
  state.currentMonth = `${y}-${String(m).padStart(2,'0')}`;
  document.getElementById('monthInput').value = state.currentMonth;
  save(); render();
}

function fmt(amt) {
  const sym = CURRENCIES[state.currency] || '₱';
  return `${sym}${Number(amt || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
}

function evaluateAmount(val) {
  if (typeof val === 'number') return val;
  if (!val) return 0;
  try {
    let clean = val.toString().replace(/,/g, '').trim();
    if (/^[0-9+\-*/. ()]+$/.test(clean)) {
      return Function(`'use strict'; return (${clean})`)() || 0;
    }
  } catch(e){}
  return parseFloat(val) || 0;
}

function uid(){ return Math.random().toString(36).substr(2, 9); }

function render() {
  renderCategoryDropdown();
  renderSummary();
  renderTransactionsTable();
  renderCategoryBreakdown();
  renderBills();
  renderGoals();
}

function renderCategoryDropdown() {
  const sel = document.getElementById('txCatFilter');
  const current = sel.value;
  const cats = new Set(state.transactions.map(t => t.category || 'Other'));
  sel.innerHTML = '<option value="ALL">All Categories</option>';
  cats.forEach(c => {
    sel.innerHTML += `<option value="${c}">${c}</option>`;
  });
  sel.value = current;
}

function renderSummary() {
  const monthTxs = state.transactions.filter(t => t.date && t.date.startsWith(state.currentMonth));
  let inc = 0, exp = 0;
  monthTxs.forEach(t => {
    if(t.amount > 0) inc += t.amount;
    else exp += Math.abs(t.amount);
  });
  
  const net = inc - exp;
  document.getElementById('netBalance').innerText = fmt(net);
  document.getElementById('netBalance').className = `stat-val ${net >= 0 ? 'pos' : 'neg'}`;
  document.getElementById('totalIncome').innerText = fmt(inc);
  document.getElementById('totalExpense').innerText = fmt(exp);

  const max = Math.max(inc, exp) || 1;
  document.getElementById('incomeBar').style.width = `${Math.min(100, (inc/max)*100)}%`;
  document.getElementById('expenseBar').style.width = `${Math.min(100, (exp/max)*100)}%`;
}

function renderTransactionsTable() {
  const tbody = document.getElementById('txTableBody');
  const search = document.getElementById('txSearch').value.toLowerCase();
  const cat = document.getElementById('txCatFilter').value;

  let filtered = state.transactions.filter(t => t.date && t.date.startsWith(state.currentMonth));
  
  if(cat !== 'ALL') {
    filtered = filtered.filter(t => t.category === cat);
  }
  if(search) {
    filtered = filtered.filter(t => 
      (t.desc && t.desc.toLowerCase().includes(search)) || 
      (t.category && t.category.toLowerCase().includes(search))
    );
  }

  filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

  // Calculate sum of filtered transactions
  const filteredSum = filtered.reduce((acc, t) => acc + Number(t.amount || 0), 0);
  const sumValEl = document.getElementById('filteredSumValue');
  sumValEl.innerText = fmt(filteredSum);
  sumValEl.style.color = filteredSum >= 0 ? 'var(--green)' : 'var(--red)';

  tbody.innerHTML = '';
  if(filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: var(--text-faint);">No transactions found</td></tr>`;
    return;
  }

  filtered.forEach(t => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="mono" style="font-size:0.8rem;">${t.date}</td>
      <td>${t.desc}</td>
      <td><span class="tag">${t.category || 'Other'}</span></td>
      <td style="text-align:right;" class="mono ${t.amount >= 0 ? 'tag-income' : 'tag-expense'}">
        ${t.amount >= 0 ? '+' : ''}${fmt(t.amount)}
      </td>
      <td style="text-align:center;">
        <div class="actions" style="justify-content:center;">
          <button class="icon-btn" onclick="editTx('${t.id}')">✏</button>
          <button class="icon-btn" onclick="deleteTx('${t.id}')">✕</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function renderCategoryBreakdown() {
  const container = document.getElementById('categoryBreakdown');
  container.innerHTML = '';
  
  const monthTxs = state.transactions.filter(t => t.date && t.date.startsWith(state.currentMonth) && t.amount < 0);
  const catMap = {};
  let totalExp = 0;

  monthTxs.forEach(t => {
    const val = Math.abs(t.amount);
    catMap[t.category] = (catMap[t.category] || 0) + val;
    totalExp += val;
  });

  const sorted = Object.entries(catMap).sort((a,b) => b[1] - a[1]);

  if(sorted.length === 0) {
    container.innerHTML = `<div style="font-size:0.8rem; color:var(--text-faint);">No expenses logged this month</div>`;
    return;
  }

  sorted.forEach(([cat, amt]) => {
    const pct = totalExp ? Math.round((amt/totalExp)*100) : 0;
    container.innerHTML += `
      <div>
        <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;">
          <span>${cat}</span>
          <span class="mono">${fmt(amt)} (${pct}%)</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
    `;
  });
}

function renderBills() {
  const container = document.getElementById('billsList');
  container.innerHTML = '';
  if(!state.bills.length) {
    container.innerHTML = `<div style="font-size:0.8rem; color:var(--text-faint);">No recurring bills</div>`;
    return;
  }
  state.bills.forEach(b => {
    container.innerHTML += `
      <div style="display:flex; justify-content:space-between; align-items:center; background:var(--card-2); padding:8px 12px; border-radius:8px; border:1px solid var(--line);">
        <div>
          <div style="font-weight:600; font-size:0.85rem;">${b.name}</div>
          <div style="font-size:0.75rem; color:var(--text-dim);">Due: ${b.due || 'N/A'}</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px;">
          <span class="mono" style="font-weight:600;">${fmt(b.amount)}</span>
          <button class="icon-btn" onclick="deleteBill('${b.id}')">✕</button>
        </div>
      </div>
    `;
  });
}

function renderGoals() {
  const container = document.getElementById('goalsList');
  container.innerHTML = '';
  if(!state.goals.length) {
    container.innerHTML = `<div style="font-size:0.8rem; color:var(--text-faint);">No active goals</div>`;
    return;
  }
  state.goals.forEach(g => {
    const pct = Math.min(100, Math.round((g.saved / g.target) * 100)) || 0;
    container.innerHTML += `
      <div>
        <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;">
          <span>${g.name}</span>
          <span class="mono">${fmt(g.saved)} / ${fmt(g.target)}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%; background:var(--cyan);"></div></div>
      </div>
    `;
  });
}

function deleteTx(id){
  state.transactions = state.transactions.filter(t => t.id !== id);
  save(); render();
}

function deleteBill(id){
  state.bills = state.bills.filter(b => b.id !== id);
  save(); render();
}

function editTx(id){
  const t = state.transactions.find(x => x.id === id);
  if(t) openModal('transaction', t);
}

function openModal(type, data = null) {
  const bg = document.getElementById('modalBg');
  const content = document.getElementById('modalContent');
  bg.classList.add('open');

  if(type === 'transaction') {
    const isEdit = !!data;
    content.innerHTML = `
      <div class="modal-head">
        <h3>${isEdit ? 'Edit' : 'Add'} Transaction</h3>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f_date" class="input-text" value="${data ? data.date : state.currentMonth + '-01'}">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="f_desc" class="input-text" value="${data ? data.desc : ''}">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="f_cat" class="input-text" value="${data ? data.category : 'Groceries'}" placeholder="e.g. Groceries, Salary">
      </div>
      <div class="form-group">
        <label>Amount (Negative for Expense, Positive for Income)</label>
        <input type="text" id="f_amt" class="input-text" value="${data ? data.amount : ''}" placeholder="-500 or 1500">
      </div>
      <div style="display:flex; justify-content:space-between; gap:8px; margin-top:8px;">
        ${isEdit ? `<button class="btn" style="background:var(--red); color:#fff;" onclick="deleteTx('${data.id}'); closeModal();">Delete</button>` : '<div></div>'}
        <button class="btn btn-primary" onclick="submitTx('${isEdit ? data.id : ''}')">Save</button>
      </div>
    `;
  } else if(type === 'bill') {
    content.innerHTML = `
      <div class="modal-head">
        <h3>Add Bill</h3>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Bill Name</label>
        <input type="text" id="f_name" class="input-text" placeholder="Electricity">
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input type="text" id="f_amt" class="input-text" placeholder="1500">
      </div>
      <div class="form-group">
        <label>Due Date / Day</label>
        <input type="text" id="f_due" class="input-text" placeholder="15th of month">
      </div>
      <button class="btn btn-primary" onclick="submitBill()">Save Bill</button>
    `;
  } else if(type === 'goal') {
    content.innerHTML = `
      <div class="modal-head">
        <h3>Add Savings Goal</h3>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Goal Name</label>
        <input type="text" id="f_name" class="input-text" placeholder="Emergency Fund">
      </div>
      <div class="form-group">
        <label>Current Saved</label>
        <input type="text" id="f_saved" class="input-text" placeholder="5000">
      </div>
      <div class="form-group">
        <label>Target Amount</label>
        <input type="text" id="f_target" class="input-text" placeholder="50000">
      </div>
      <button class="btn btn-primary" onclick="submitGoal()">Save Goal</button>
    `;
  } else if(type === 'import') {
    content.innerHTML = `
      <div class="modal-head">
        <h3>Import Transactions</h3>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="file-drop" onclick="document.getElementById('csvFile').click()">
        Click to Upload CSV or Excel File (.csv, .xlsx, .xls)
        <input type="file" id="csvFile" accept=".csv, .xlsx, .xls" style="display:none;" onchange="handleFile(this)">
      </div>
    `;
  } else if(type === 'settings') {
    content.innerHTML = `
      <div class="modal-head">
        <h3>Dashboard Settings</h3>
        <button class="icon-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Delete Data in Range</label>
        <div style="display:flex; gap:8px;">
          <input type="date" id="r_start" class="input-text" style="flex:1;">
          <input type="date" id="r_end" class="input-text" style="flex:1;">
        </div>
        <button class="btn" style="background:var(--red); color:#fff; margin-top:6px;" onclick="clearRangeData()">Delete Date Range</button>
      </div>
      <hr style="border:none; border-top:1px solid var(--line);">
      <div class="form-group">
        <label style="color:var(--red);">Danger Zone</label>
        <button class="btn" style="background:var(--red); color:#fff;" onclick="clearAllData()">Clear ALL Dashboard Data</button>
      </div>
    `;
  }
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function submitTx(editId) {
  const date = document.getElementById('f_date').value || state.currentMonth + '-01';
  const desc = document.getElementById('f_desc').value.trim() || 'Untitled';
  const category = document.getElementById('f_cat').value.trim() || 'Other';
  const amount = evaluateAmount(document.getElementById('f_amt').value);

  if(editId) {
    const item = state.transactions.find(t => t.id === editId);
    if(item) { item.date = date; item.desc = desc; item.category = category; item.amount = amount; }
  } else {
    state.transactions.push({ id: uid(), date, desc, category, amount });
  }
  closeModal(); save(); render();
}

function submitBill() {
  const name = document.getElementById('f_name').value.trim() || 'Untitled';
  const amount = evaluateAmount(document.getElementById('f_amt').value);
  const due = document.getElementById('f_due').value.trim();

  state.bills.push({ id: uid(), name, amount, due });
  closeModal(); save(); render();
}

function submitGoal() {
  const name = document.getElementById('f_name').value.trim() || 'Untitled';
  const saved = evaluateAmount(document.getElementById('f_saved').value);
  const target = evaluateAmount(document.getElementById('f_target').value) || 1;

  state.goals.push({ id: uid(), name, saved, target });
  closeModal(); save(); render();
}

function handleFile(input) {
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  const ext = file.name.split('.').pop().toLowerCase();

  if(ext === 'csv') {
    reader.onload = (e) => {
      parseCSV(e.target.result);
      closeModal(); save(); render();
    };
    reader.readAsText(file);
  } else {
    reader.onload = (e) => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type: 'array'});
      const sheetName = workbook.SheetNames[0];
      const csv = XLSX.utils.sheet_to_csv(workbook.Sheets[sheetName]);
      parseCSV(csv);
      closeModal(); save(); render();
    };
    reader.readAsArrayBuffer(file);
  }
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if(lines.length <= 1) return;

  for(let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g, '').trim());
    if(cols.length >= 4) {
      const date = cols[0];
      const desc = cols[1];
      const category = cols[2] || 'Other';
      const amount = evaluateAmount(cols[3]);
      if(date && !isNaN(amount)) {
        state.transactions.push({ id: uid(), date, desc, category, amount });
      }
    }
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `budget_backup_${state.currentMonth}.json`;
  a.click();
}

function clearRangeData() {
  const start = document.getElementById('r_start').value;
  const end = document.getElementById('r_end').value;
  if(!start || !end) { alert('Please select both Start and End dates.'); return; }

  if(confirm(`Delete transactions between ${start} and ${end}?`)) {
    state.transactions = state.transactions.filter(t => t.date < start || t.date > end);
    closeModal(); save(); render();
  }
}

function clearAllData() {
  if(confirm('Are you sure you want to delete ALL data? This cannot be undone.')) {
    state.transactions = [];
    state.bills = [];
    state.goals = [];
    save(); render();
    closeModal();
  }
}

document.getElementById('modalBg').addEventListener('click', (e)=>{ if(e.target.id==='modalBg') closeModal(); });
document.getElementById('themeBtn').addEventListener('click', ()=>{
  const b = document.body;
  b.setAttribute('data-mode', b.getAttribute('data-mode')==='dark' ? 'light' : 'dark');
});

init();
</script>
</body>
</html>
