<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Control Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --bg: #0B1220;
    --card: #101C30;
    --card-2: #0D1728;
    --line: rgba(148,163,184,0.14);
    --line-strong: rgba(148,163,184,0.24);
    --text: #E7EEF6;
    --text-dim: #94A3B8;
    --text-faint: #5B6B80;
    --cyan: #22D3EE;
    --teal: #14B8A6;
    --grad: linear-gradient(90deg, var(--cyan), var(--teal));
    --red: #EF6461;
    --amber: #F2B155;
    --violet: #A78BFA;
    --pink: #F472B6;
    --blue: #60A5FA;
    --green: #34D399;
  }
  [data-mode="light"]{
    --bg: #F3F6FA;
    --card: #FFFFFF;
    --card-2: #FBFCFE;
    --line: rgba(15,23,42,0.08);
    --line-strong: rgba(15,23,42,0.14);
    --text: #0F1B2E;
    --text-dim: #5B6B80;
    --text-faint: #93A2B5;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 32px 20px 80px;
    transition: background .2s, color .2s;
  }
  .wrap{ max-width: 1040px; margin: 0 auto; }
  .num{ font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
  .brand{ display:flex; align-items:center; gap: 10px; }
  .mark{ width: 34px; height:34px; border-radius: 9px; background: var(--grad); display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk'; font-weight:700; font-size:13px; color:#04211E; flex-shrink:0; text-transform: uppercase; }
  .brand-text h1{ font-family:'Space Grotesk'; font-size: 17px; font-weight:700; margin:0; letter-spacing: -0.01em; }

  .controls-group {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .month-picker{
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    padding: 4px 8px;
    gap: 8px;
  }
  .month-picker button{
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .month-picker button:hover{ color: var(--text); background: var(--card-2); }
  .month-picker input[type="month"]{
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    outline: none;
  }

  .actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{ width:34px; height:34px; border-radius:9px; border:1px solid var(--line-strong); background: var(--card); color: var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; }
  .icon-btn:hover{ color: var(--text); border-color: var(--cyan); }

  /* Summary Banner Cards */
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  @media (max-width: 600px){ .summary-grid { grid-template-columns: 1fr; } }
  .summary-card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 16px; text-align: left; }
  .summary-card .label { font-size: 11px; text-transform: uppercase; color: var(--text-faint); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 6px; }
  .summary-card .val { font-size: 20px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .summary-card.in .val { color: var(--green); }
  .summary-card.out .val { color: var(--red); }
  .summary-card.net .val { color: var(--cyan); }

  .grid3{ display:grid; grid-template-columns: 1.1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 860px){ .grid3{ grid-template-columns: 1fr; } }

  .card{ background: var(--card); border:1px solid var(--line); border-radius: 14px; padding: 18px 18px 16px; }
  .card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .card-head h2{ font-family:'Space Grotesk'; font-size: 14px; font-weight: 500; margin:0; letter-spacing: 0.01em; }
  .card-head .sub{ font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; }
  
  .head-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .add-link{ background:none; border:none; color: var(--cyan); font-size: 12px; font-weight:500; cursor:pointer; font-family:'Inter'; display:flex; align-items:center; gap:4px; }
  .add-link:hover{ color: var(--teal); }
  .add-link.secondary{ color: var(--text-dim); }
  .add-link.secondary:hover{ color: var(--text); }

  /* Multi-Column Filter Grid Toolbar */
  .filter-panel {
    background: var(--card-2);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .filter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .reset-filter-btn {
    background: none;
    border: none;
    color: var(--cyan);
    font-size: 11px;
    cursor: pointer;
    font-weight: 500;
  }
  .reset-filter-btn:hover { text-decoration: underline; }

  .filter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
  }
  .filter-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .filter-field label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-faint);
  }
  .filter-input, .filter-select {
    background: var(--card);
    border: 1px solid var(--line-strong);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    outline: none;
    width: 100%;
  }
  .filter-input:focus, .filter-select:focus { border-color: var(--cyan); }
  .filter-range-inputs { display: flex; gap: 4px; }
  .filter-range-inputs input { width: 50%; }

  .cat-row{ margin-bottom: 13px; cursor: pointer; }
  .cat-row:last-child{ margin-bottom: 0; }
  .cat-row-top{ display:flex; justify-content:space-between; font-size:13px; margin-bottom: 6px; }
  .cat-row-top .name{ display:flex; align-items:center; gap:8px; }
  .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .cat-row-top .amt{ color: var(--text-dim); font-size:12px; }
  .bar-track{ height:5px; border-radius: 3px; background: rgba(148,163,184,0.15); overflow:hidden; }
  .bar-fill{ height:100%; border-radius:3px; }

  .list-item{ display:flex; align-items:center; justify-content:space-between; padding: 9px 0; border-bottom: 1px solid var(--line); gap: 10px; }
  .list-item:last-child{ border-bottom:none; padding-bottom:0; }
  .li-left{ display:flex; align-items:center; gap:10px; min-width:0; }
  .li-icon{ width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .li-text .t1{ font-size: 13px; font-weight:500; }
  .li-text .t2{ font-size: 11px; color: var(--text-faint); }
  .li-right{ text-align:right; flex-shrink:0; }
  .badge{ font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight:500; white-space:nowrap; }
  .badge.overdue{ background: rgba(239,100,97,0.15); color: var(--red); }
  .badge.soon{ background: rgba(242,177,85,0.15); color: var(--amber); }
  .badge.later{ background: rgba(96,165,250,0.12); color: var(--blue); }
  .action-btn{ background:none; border:none; color: var(--text-faint); cursor:pointer; font-size: 13px; padding: 2px 4px; }
  .action-btn:hover{ color: var(--cyan); }
  .action-btn.del:hover{ color: var(--red); }

  /* Transaction Delete Button - Hidden by default, reveals on row hover */
  .action-btn.del.tx-del {
    display: none;
  }
  tr.draggable-row:hover .action-btn.del.tx-del {
    display: inline-block;
  }

  .copy-btn {
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 5px;
    border-radius: 4px;
    margin-left: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .copy-btn:hover { color: var(--cyan); background: var(--card-2); }

  .goal{ margin-bottom: 16px; }
  .goal:last-child{ margin-bottom:0; }
  .goal-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .goal-top .name{ font-size:13px; font-weight:500; }
  .goal-top .pct{ font-size: 11px; color: var(--text-dim); }
  .goal-nums{ display:flex; justify-content:space-between; font-size: 11px; color: var(--text-faint); margin-top: 5px; }

  table{ width:100%; border-collapse: collapse; font-size: 13px; user-select: text; }
  th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color: var(--text-faint); font-weight:500; padding: 0 0 10px; user-select: none; }
  th.sortable { cursor: pointer; transition: color 0.15s; }
  th.sortable:hover { color: var(--cyan); }
  th.sortable .sort-icon { font-size: 10px; margin-left: 3px; color: var(--cyan); }
  th.r, td.r{ text-align:right; }
  td{ padding: 9px 0; border-top: 1px solid var(--line); }
  tr:first-child td{ border-top:none; }
  
  tr.draggable-row{ cursor: default; }
  tr.dragging{ opacity: 0.4; background: var(--card-2); }
  .drag-handle{ color: var(--text-faint); cursor: grab; user-select: none; padding-right: 6px; font-weight: bold; }

  .cat-pill{ display:inline-flex; align-items:center; gap:6px; font-size:12px; color: var(--text-dim); }

  /* Bottom Add Button Bar */
  .bottom-add-bar {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px dashed var(--line-strong);
    display: flex;
    justify-content: center;
  }
  .bottom-add-btn {
    background: var(--card-2);
    border: 1px dashed var(--cyan);
    color: var(--cyan);
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
  }
  .bottom-add-btn:hover {
    background: var(--cyan);
    color: #04211E;
    border-style: solid;
    box-shadow: 0 4px 12px rgba(34, 211, 238, 0.2);
  }

  .modal-bg{ position:fixed; inset:0; background: rgba(4,10,20,0.6); display:none; align-items:center; justify-content:center; z-index: 50; padding: 20px; }
  .modal-bg.open{ display:flex; }
  .modal{ background: var(--card); border:1px solid var(--line-strong); border-radius: 14px; padding: 20px; width: 100%; max-width: 440px; }
  .modal h3{ font-family:'Space Grotesk'; font-size:16px; margin: 0 0 14px; }
  .field{ margin-bottom: 12px; }
  .field label{ display:block; font-size:11px; color: var(--text-dim); margin-bottom:5px; }
  .field input, .field select{
    width:100%; background: var(--card-2); border:1px solid var(--line-strong); color: var(--text);
    border-radius:8px; padding: 8px 10px; font-size:13px; font-family:'Inter';
  }
  .field input:focus, .field select:focus{ outline:none; border-color: var(--cyan); }
  .settings-danger-box {
    margin-top: 18px;
    padding: 14px;
    background: rgba(239, 100, 97, 0.05);
    border: 1px solid rgba(239, 100, 97, 0.2);
    border-radius: 10px;
  }
  .settings-danger-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .range-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .modal-actions{ display:flex; gap:8px; margin-top: 18px; }
  .btn{ flex:1; padding: 9px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid var(--line-strong); background:transparent; color: var(--text-dim); font-family:'Inter'; }
  .btn.primary{ background: var(--grad); color:#04211E; border:none; }
  .btn.danger{ border-color: var(--red); color: var(--red); }
  .btn.danger:hover{ background: rgba(239, 100, 97, 0.15); }
  .btn:hover{ opacity:0.9; }
  .empty{ font-size:12px; color: var(--text-faint); padding: 6px 0; }
</style>
</head>
<body data-mode="dark">
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="mark" id="brandMark">PL</div>
      <div class="brand-text">
        <h1 id="brandTitle">Budget Control</h1>
      </div>
    </div>

    <div class="controls-group">
      <div class="month-picker">
        <button onclick="changeMonth(-1)">◀</button>
        <input type="month" id="monthInput" onchange="onMonthSelect(this.value)">
        <button onclick="changeMonth(1)">▶</button>
      </div>
    </div>

    <div class="actions">
      <button class="icon-btn" onclick="openModal('settings')" title="Dashboard Settings">⚙</button>
      <button class="icon-btn" id="themeBtn" title="Toggle theme">◐</button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card in">
      <div class="label">Total Cash In</div>
      <div class="val num" id="totalCashIn">₱0.00</div>
    </div>
    <div class="summary-card out">
      <div class="label">Total Cash Out</div>
      <div class="val num" id="totalCashOut">₱0.00</div>
    </div>
    <div class="summary-card net">
      <div class="label">Net Balance</div>
      <div class="val num" id="totalNetBalance">₱0.00</div>
    </div>
  </div>

  <div class="grid3">
    <div class="card">
      <div class="card-head">
        <div>
          <h2>Top categories</h2>
          <div class="sub" id="catCount">0 categories</div>
        </div>
      </div>
      <div id="catList"></div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <h2>Upcoming bills</h2>
          <div class="sub" id="billCount">0 active</div>
        </div>
        <button class="add-link" onclick="openModal('bill')">+ Add</button>
      </div>
      <div id="billList"></div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <h2>Goals</h2>
          <div class="sub" id="goalCount">0 active</div>
        </div>
        <button class="add-link" onclick="openModal('goal')">+ Add</button>
      </div>
      <div id="goalList"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <div>
        <h2>Transactions (<span id="selectedMonthText"></span>)</h2>
        <div class="sub" id="txCount">0 entries</div>
      </div>
      <div class="head-actions">
        <input type="file" id="importFileInput" accept=".csv, .xlsx, .xls" style="display:none" onchange="handleFileImport(event)">
        <button class="add-link secondary" onclick="document.getElementById('importFileInput').click()" title="Import CSV or Excel file">⬆ Import File</button>
        <button class="add-link secondary" onclick="downloadCSVCurrentMonth()" title="Export CSV for current month">⬇ Export CSV</button>
        <button class="add-link secondary" onclick="openModal('export_custom')" title="Export customized date range">📅 Custom Range</button>
        <button class="add-link" onclick="openModal('tx')">+ Add transaction</button>
      </div>
    </div>

    <div class="filter-panel">
      <div class="filter-header">
        <span>🔎 Column Filters</span>
        <button class="reset-filter-btn" onclick="clearFilters()">Reset Filters</button>
      </div>
      <div class="filter-grid">
        <div class="filter-field">
          <label>Date Filter</label>
          <input type="text" id="filterDate" class="filter-input" placeholder="YYYY-MM-DD" oninput="renderTransactions()">
        </div>
        <div class="filter-field">
          <label>Description Search</label>
          <input type="text" id="filterDesc" class="filter-input" placeholder="Search..." oninput="renderTransactions()">
        </div>
        <div class="filter-field">
          <label>Category</label>
          <select id="filterCat" class="filter-select" onchange="renderTransactions()">
            <option value="ALL">All Categories</option>
          </select>
        </div>
        <div class="filter-field">
          <label>Amount (Min / Max)</label>
          <div class="filter-range-inputs">
            <input type="number" id="filterAmtMin" class="filter-input" placeholder="Min" oninput="renderTransactions()">
            <input type="number" id="filterAmtMax" class="filter-input" placeholder="Max" oninput="renderTransactions()">
          </div>
        </div>
        <div class="filter-field">
          <label>Balance (Min / Max)</label>
          <div class="filter-range-inputs">
            <input type="number" id="filterBalMin" class="filter-input" placeholder="Min" oninput="renderTransactions()">
            <input type="number" id="filterBalMax" class="filter-input" placeholder="Max" oninput="renderTransactions()">
          </div>
        </div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th style="width: 24px;"></th>
          <th class="sortable" onclick="handleSort('date')">Date <span id="sort-date"></span></th>
          <th class="sortable" onclick="handleSort('desc')">Description <span id="sort-desc"></span></th>
          <th class="sortable" onclick="handleSort('cat')">Category <span id="sort-cat"></span></th>
          <th class="sortable r" onclick="handleSort('amount')">Amount <span id="sort-amount"></span></th>
          <th class="sortable r" onclick="handleSort('currentBalance')">Balance <span id="sort-currentBalance"></span></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="txBody"></tbody>
    </table>

    <div class="bottom-add-bar">
      <button class="bottom-add-btn" onclick="openModal('tx')">+ Add Transaction</button>
    </div>
  </div>

</div>

<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBody"></div>
</div>

<script>
const CATS = [
  {name:'Education', color:'var(--cyan)'},
  {name:'Housing', color:'var(--red)'},
  {name:'Shopping', color:'var(--pink)'},
  {name:'Transport', color:'var(--blue)'},
  {name:'Travel', color:'var(--violet)'},
  {name:'Entertainment', color:'var(--amber)'},
  {name:'Personal care', color:'var(--teal)'},
  {name:'Groceries', color:'var(--green)'},
  {name:'Other', color:'var(--text-faint)'}
];

const DEFAULT_CURRENCY_MAP = { PHP: '₱', EUR: '€', USD: '$', GBP: '£', JPY: '¥', CAD: 'CA$', AUD: 'A$' };

let currentMonth = "2026-07";
let currentSortColumn = null;
let currentSortDirection = 'asc';

let state = {
  appName: 'Budget Control',
  appMark: 'PL',
  currency: 'PHP',
  customSymbol: '₱',
  transactions: [],
  bills: [],
  goals: [],
  budgets: { Education: 5000, Housing: 1200, Shopping: 200, Transport: 200, Travel: 100, Entertainment: 150, 'Personal care': 120, Groceries: 20000, Other: 1506 }
};

function uid(){ return Math.random().toString(36).slice(2,10); }

function evaluateAmount(val) {
  if (typeof val === 'number') return val;
  if (!val) return 0;
  const sanitized = String(val).replace(/[^0-9+\-*/().]/g, '');
  try {
    return Number(Function('"use strict"; return (' + sanitized + ')')()) || 0;
  } catch (e) {
    return parseFloat(val) || 0;
  }
}

function getSymbol() {
  return state.customSymbol || DEFAULT_CURRENCY_MAP[state.currency] || '$';
}

function money(n){ 
  const symbol = getSymbol();
  const decimals = state.currency === 'JPY' ? 0 : 2;
  const formatted = Math.abs(n).toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
  return n < 0 ? `-${symbol}${formatted}` : `${symbol}${formatted}`;
}

function catInfo(name){ return CATS.find(c=>c.name===name) || CATS[CATS.length-1]; }

function load(){
  try{
    const raw = localStorage.getItem('budgetControlState');
    if(raw){ 
      state = Object.assign({}, state, JSON.parse(raw)); 
    }
  }catch(e){}
  populateCategoryFilterOptions();
}

function save(){
  try{ 
    localStorage.setItem('budgetControlState', JSON.stringify(state)); 
  }catch(e){}
  render();
}

function resetDateRangeData() {
  const startDate = document.getElementById('r_start_date').value;
  const endDate = document.getElementById('r_end_date').value;

  if (!startDate || !endDate) {
    alert("Please select both a start and end date to reset.");
    return;
  }

  if (startDate > endDate) {
    alert("Start date cannot be after end date.");
    return;
  }

  const matches = state.transactions.filter(t => t.date >= startDate && t.date <= endDate);
  
  if (matches.length === 0) {
    alert("No transactions found in the selected date range.");
    return;
  }

  if (confirm(`Are you sure you want to delete ${matches.length} transaction(s) between ${startDate} and ${endDate}?`)) {
    state.transactions = state.transactions.filter(t => t.date < startDate || t.date > endDate);
    save();
    closeModal();
    alert("Transactions in selected range deleted successfully!");
  }
}

function resetAllData() {
  if (confirm("Are you sure you want to reset ALL data? This will permanently clear all transactions, bills, goals, and customized settings.")) {
    localStorage.removeItem('budgetControlState');
    location.reload();
  }
}

function changeMonth(offset) {
  let [y, m] = currentMonth.split('-').map(Number);
  m += offset;
  if (m > 12) { m = 1; y++; }
  if (m < 1) { m = 12; y--; }
  currentMonth = `${y}-${String(m).padStart(2, '0')}`;
  updateMonthUI();
  render();
}

function onMonthSelect(val) {

  currentMonth = val;

function daysUntil(dateStr){
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  return Math.round((d - today) / 86400000);
}

function copyText(text, btnEl) {
  navigator.clipboard.writeText(text).then(() => {
    const originalText = btnEl.textContent;
    btnEl.textContent = 'Copied!';
    btnEl.style.color = 'var(--green)';
    setTimeout(() => {
      btnEl.textContent = originalText;
      btnEl.style.color = '';
    }, 1200);
  }).catch(err => {
    console.error('Failed to copy text: ', err);
  });
}

/* File Import Logic */
function handleFileImport(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[firstSheetName];
      const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

      if (!json || json.length === 0) {
        alert("The selected file is empty or formatted incorrectly.");
        return;
      }

      let importedCount = 0;
      let newestDateFound = null;

      json.forEach(row => {
        const keys = Object.keys(row);
        const dateKey = keys.find(k => k.toLowerCase().trim() === 'date');
        const descKey = keys.find(k => k.toLowerCase().trim() === 'description');
        const catKey = keys.find(k => k.toLowerCase().trim() === 'category');
        const amtKey = keys.find(k => k.toLowerCase().includes('amount'));

        if (dateKey && descKey && amtKey) {
          let rawDate = String(row[dateKey]).trim();
          
          let formattedDate = rawDate;
          if (/^\d{4}-\d{2}-\d{2}$/.test(rawDate)) {
            formattedDate = rawDate;
          } else if (typeof row[dateKey] === 'number') {
            const parsedDate = XLSX.SSF.parse_date_code(row[dateKey]);
            if (parsedDate) {
              const y = parsedDate.y;
              const m = String(parsedDate.m).padStart(2, '0');
              const d = String(parsedDate.d).padStart(2, '0');
              formattedDate = `${y}-${m}-${d}`;
            }
          }

          const desc = String(row[descKey]).trim();
          const cat = catKey && row[catKey] ? String(row[catKey]).trim() : 'Other';
          const rawAmt = String(row[amtKey]).replace(/[^0-9.-]/g, '');
          const amount = parseFloat(rawAmt);

          if (formattedDate && desc && !isNaN(amount)) {
            state.transactions.push({
              id: uid(),
              date: formattedDate,
              desc: desc,
              cat: cat,
              amount: amount
            });
            importedCount++;
            if (!newestDateFound || formattedDate > newestDateFound) {
              newestDateFound = formattedDate;
            }
          }
        }
      });

      if (importedCount > 0) {
        if (newestDateFound) {
          currentMonth = newestDateFound.substring(0, 7);
          updateMonthUI();
        }
        save();
        alert(`Successfully imported ${importedCount} transaction(s)!`);
      } else {
        alert("Could not find valid transaction data. Ensure columns match: Date, Description, Category, Amount.");
      }
    } catch (err) {
      console.error(err);
      alert("An error occurred while parsing the file. Please check the file format.");
    }
    event.target.value = '';
  };

  reader.readAsArrayBuffer(file);
}

function render(){
  document.getElementById('brandTitle').textContent = state.appName || 'Budget Control';
  document.getElementById('brandMark').textContent = state.appMark || 'PL';

  renderSummary();
  renderCategories();
  renderBills();

function renderSummary() {
  const monthlyTx = state.transactions.filter(t => t.date.startsWith(currentMonth));
  
  let cashIn = 0;
  let cashOut = 0;

  monthlyTx.forEach(t => {
    if (t.amount > 0) {
      cashIn += t.amount;
    } else {
      cashOut += Math.abs(t.amount);
    }
  });

  const netBalance = cashIn - cashOut;

  document.getElementById('totalCashIn').textContent = money(cashIn);
  document.getElementById('totalCashOut').textContent = money(cashOut);
  document.getElementById('totalNetBalance').textContent = money(netBalance);
}

function renderCategories(){
  const totals = {};
  const monthlyTx = state.transactions.filter(t => t.date.startsWith(currentMonth));
  
  monthlyTx.forEach(t => { 
    const expenseAmt = t.amount < 0 ? Math.abs(t.amount) : 0;
    totals[t.cat] = (totals[t.cat]||0) + expenseAmt; 
  });
  const rows = Object.keys(totals).map(name => ({ name, spent: totals[name], budget: state.budgets[name] || totals[name] }));
  rows.sort((a,b)=> b.spent - a.spent);
  
  document.getElementById('catCount').textContent = rows.length + ' categories';
  const el = document.getElementById('catList');
  if(rows.length === 0){ el.innerHTML = '<div class="empty">No expenses logged for this month.</div>'; return; }
  
  el.innerHTML = rows.slice(0,6).map(r=>{
    const pct = Math.min(100, Math.round((r.spent / r.budget) * 100));
    const c = catInfo(r.name);
    return `<div class="cat-row" onclick="openModal('budget', '${r.name}')" title="Click to edit budget limit">
      <div class="cat-row-top">
        <div class="name"><span class="dot" style="background:${c.color}"></span>${r.name}</div>
        <div class="amt num">${money(r.spent)} / ${money(r.budget)}</div>

      <div class="bar-track"><div class="bar-fill" style="width:${pct}%; background:${pct>=100?'var(--red)':c.color}"></div></div>
    </div>`;
  }).join('');
}

function renderTransactions(){
  updateSortIcons();

  let allMonthlyRows = state.transactions.filter(t => t.date.startsWith(currentMonth));
  allMonthlyRows.sort((a, b) => new Date(a.date) - new Date(b.date));
  
  let runningBalance = 0;
  const rowsWithBalance = allMonthlyRows.map(t => {
    runningBalance += t.amount;
    return { ...t, currentBalance: runningBalance };
  });

  const fDate = (document.getElementById('filterDate')?.value || '').trim();
  const fDesc = (document.getElementById('filterDesc')?.value || '').toLowerCase().trim();
  const fCat = document.getElementById('filterCat')?.value || 'ALL';
  const fAmtMin = document.getElementById('filterAmtMin')?.value !== '' ? parseFloat(document.getElementById('filterAmtMin').value) : null;
  const fAmtMax = document.getElementById('filterAmtMax')?.value !== '' ? parseFloat(document.getElementById('filterAmtMax').value) : null;
  const fBalMin = document.getElementById('filterBalMin')?.value !== '' ? parseFloat(document.getElementById('filterBalMin').value) : null;
  const fBalMax = document.getElementById('filterBalMax')?.value !== '' ? parseFloat(document.getElementById('filterBalMax').value) : null;

  let filteredRows = rowsWithBalance.filter(t => {
    const matchDate = !fDate || t.date.includes(fDate);
    const matchDesc = !fDesc || t.desc.toLowerCase().includes(fDesc);
    const matchCat = fCat === 'ALL' || t.cat === fCat;
    const matchAmt = (fAmtMin === null || t.amount >= fAmtMin) && (fAmtMax === null || t.amount <= fAmtMax);
    const matchBal = (fBalMin === null || t.currentBalance >= fBalMin) && (fBalMax === null || t.currentBalance <= fBalMax);
    
    return matchDate && matchDesc && matchCat && matchAmt && matchBal;
  });

  if (currentSortColumn) {
    filteredRows.sort((a, b) => {
      let valA = a[currentSortColumn];
      let valB = b[currentSortColumn];

      if (typeof valA === 'string') {
        valA = valA.toLowerCase();
        valB = valB.toLowerCase();
      }

      if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
      if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
      return 0;
    });
  }

  document.getElementById('txCount').textContent = filteredRows.length + ' entries';
  const el = document.getElementById('txBody');
  if(filteredRows.length === 0){ el.innerHTML = '<tr><td colspan="7" class="empty">No matching transactions found.</td></tr>'; return; }

  el.innerHTML = filteredRows.map(t => {
    const c = catInfo(t.cat);
    const amountColor = t.amount < 0 ? 'var(--text)' : 'var(--green)';
    const safeDesc = t.desc.replace(/'/g, "\\'");
    return `<tr class="draggable-row" data-id="${t.id}">
      <td><span class="drag-handle" draggable="true">⋮⋮</span></td>
      <td class="num" style="color:var(--text-dim)">${t.date}</td>
      <td>
        <span>${t.desc}</span>
        <button class="copy-btn" onclick="copyText('${safeDesc}', this)" title="Copy text">📋 Copy</button>
      </td>
      <td><span class="cat-pill"><span class="dot" style="background:${c.color}"></span>${t.cat}</span></td>
      <td class="r num" style="color:${amountColor}">${money(t.amount)}</td>
      <td class="r num" style="font-weight: 600; color: var(--text-dim);">${money(t.currentBalance)}</td>
      <td class="r">
        <button class="action-btn" onclick="openModal('tx', '${t.id}')" title="Edit">✏</button>
        <button class="action-btn del tx-del" onclick="removeItem('transactions','${t.id}')" title="Delete">✕</button>
      </td>
    </tr>`;
  }).join('');

  setupDragAndDrop();
}

function setupDragAndDrop() {
  const tbody = document.getElementById('txBody');
  let draggedRow = null;

  tbody.querySelectorAll('.draggable-row').forEach(row => {
    const handle = row.querySelector('.drag-handle');
    
    handle.addEventListener('dragstart', (e) => {
      draggedRow = row;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    handle.addEventListener('dragend', () => {
      if(draggedRow) {
        draggedRow.classList.remove('dragging');
        draggedRow = null;
        saveNewOrder();
      }
    });

    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      if(!draggedRow) return;
      const afterElement = getDragAfterElement(tbody, e.clientY);
      if (afterElement == null) {
        tbody.appendChild(draggedRow);
      } else {
        tbody.insertBefore(draggedRow, afterElement);
      }
    });
  });
}

function getDragAfterElement(container, y) {
  const draggableElements = [...container.querySelectorAll('.draggable-row:not(.dragging)')];
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) {
      return { offset: offset, element: child };
    } else {
      return closest;
    }
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function saveNewOrder() {
  const rowElements = [...document.querySelectorAll('#txBody .draggable-row')];
  const newMonthOrder = rowElements.map(el => el.dataset.id);
  
  const currentMonthTx = state.transactions.filter(t => t.date.startsWith(currentMonth));
  const otherTx = state.transactions.filter(t => !t.date.startsWith(currentMonth));

  currentMonthTx.sort((a, b) => newMonthOrder.indexOf(a.id) - newMonthOrder.indexOf(b.id));

  state.transactions = [...currentMonthTx, ...otherTx];
  save();
}

function markPaid(id){
  const b = state.bills.find(x=>x.id===id);
  if(b) b.paid = true;
  save();
}

function removeItem(list, id){
  state[list] = state[list].filter(x=>x.id!==id);
  save();
}

function exportToCSV(txList, filename) {
  if (!txList || txList.length === 0) {
    alert("No transactions to export for the selected period.");
    return;
  }
  
  let csvContent = "data:text/csv;charset=utf-8,";
  csvContent += `Date,Description,Category,Amount (${getSymbol()}),Running Balance\n`;

  let running = 0;
  txList.forEach(t => {
    running += t.amount;
    const cleanDesc = `"${t.desc.replace(/"/g, '""')}"`;
    const cleanCat = `"${t.cat.replace(/"/g, '""')}"`;
    csvContent += `${t.date},${cleanDesc},${cleanCat},${t.amount},${running}\n`;
  });

  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", filename);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function downloadCSVCurrentMonth() {
  const txList = state.transactions.filter(t => t.date.startsWith(currentMonth));
  exportToCSV(txList, `Transactions_${currentMonth}.csv`);
}

function submitCustomExport() {
  const startDate = document.getElementById('f_start_date').value;
  const endDate = document.getElementById('f_end_date').value;

  if (!startDate || !endDate) {
    alert("Please select both start and end dates.");
    return;
  }

  const filtered = state.transactions.filter(t => t.date >= startDate && t.date <= endDate);
  filtered.sort((a,b) => new Date(a.date) - new Date(b.date));

  exportToCSV(filtered, `Consolidated_Transactions_${startDate}_to_${endDate}.csv`);
  closeModal();
}

function openModal(type, editId = null){
